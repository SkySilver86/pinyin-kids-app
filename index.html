<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>趣味拼音 - 樂學 Pinyin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="趣味拼音">
</head>
<body>

<div class="container" id="app">
    <header>
        <img src="assets/mascot.png" alt="Mascot" class="mascot-img">
        <h1>趣味拼音</h1>
        <p>跟著小熊貓一起快樂學拼音吧！</p>
    </header>

    <div id="home-view">
        <div class="category-tabs">
            <button class="tab-btn active" onclick="filterCategory('shengmu')">聲母</button>
            <button class="tab-btn" onclick="filterCategory('yunmu')">韻母</button>
            <button class="tab-btn" onclick="filterCategory('overall')">整體認讀</button>
            <button class="tab-btn" onclick="filterCategory('tones')">聲調</button>
        </div>

        <div class="grid" id="main-grid">
            <!-- Content will be injected by JS -->
        </div>
    </div>

    <div id="game-view" style="display: none;">
        <div class="game-container">
            <h2 id="game-status">聽聽看，這是哪一個？</h2>
            <div id="game-heart-container" style="color: var(--primary); font-size: 1.5rem; margin: 10px 0;">
                <i class="fas fa-heart"></i> <i class="fas fa-heart"></i> <i class="fas fa-heart"></i>
            </div>
            <button class="tab-btn active pulse" id="replay-btn" onclick="replayGameSound()">
                <i class="fas fa-volume-up"></i> 重播聲音
            </button>
            <div class="grid" id="game-grid" style="margin-top: 30px;">
                <!-- Game options inject here -->
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="switchView('home')">
        <i class="fas fa-home"></i>
        <span>首頁</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" id="nav-game" onclick="switchView('game')">
        <i class="fas fa-gamepad"></i>
        <span>遊戲</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>成就</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>設定</span>
    </a>
</nav>

<!-- Modal for Big Letter Display -->
<div class="modal" id="letter-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <span class="big-letter" id="modal-letter">a</span>
        <button class="tab-btn active" style="width: 100%;" onclick="speakCurrent()">
            <i class="fas fa-volume-up"></i> 播放發音
        </button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
