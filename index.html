<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>趣味拼音 - 樂學 Pinyin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="score-badge"><i class="fas fa-star" style="color: var(--tertiary);"></i> <span id="total-score">0</span></div>

<div class="container" id="app">
    <header>
        <img src="assets/mascot.png" alt="Mascot" class="mascot-img">
        <h1>趣味拼音</h1>
        <p>跟著可愛夥伴一起快樂學拼音吧！</p>
    </header>

    <!-- 首頁視圖 -->
    <div id="home-view">
        <div class="category-tabs">
            <button class="tab-btn active" data-category="shengmu" onclick="filterCategory('shengmu')">聲母</button>
            <button class="tab-btn" data-category="yunmu" onclick="filterCategory('yunmu')">韻母</button>
            <button class="tab-btn" data-category="overall" onclick="filterCategory('overall')">整體</button>
            <button class="tab-btn" data-category="yunmuTones" onclick="filterCategory('yunmuTones')">韻母聲調</button>
            <button class="tab-btn" data-category="overallTones" onclick="filterCategory('overallTones')">整體聲調</button>
        </div>
        <div class="grid" id="main-grid"></div>
    </div>

    <!-- 遊戲視圖 -->
    <div id="game-view" style="display: none;">
        <div class="game-container">
            <h2 id="game-status">聽聽看，這是哪一個？</h2>
            <button class="tab-btn active pulse" onclick="replayGameSound()">
                <i class="fas fa-volume-up"></i> 重播聲音
            </button>
            <div class="grid" id="game-grid" style="margin-top: 30px;"></div>
        </div>
    </div>

    <!-- 角色選擇視圖 -->
    <div id="mascot-view" style="display: none;">
        <h2 style="text-align: center; margin-bottom: 20px;">選擇你的小老師</h2>
        <div class="mascot-selection-grid"></div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="switchView('home')">
        <i class="fas fa-home"></i><span>首頁</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" id="nav-game" onclick="switchView('game')">
        <i class="fas fa-gamepad"></i><span>遊戲</span>
    </a>
    <a href="javascript:void(0)" class="nav-item" id="nav-mascot" onclick="switchView('mascot')">
        <i class="fas fa-paw"></i><span>角色</span>
    </a>
</nav>

<!-- 學習彈窗 -->
<div class="modal" id="letter-modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <span class="big-letter" id="modal-letter">a</span>
        
        <div class="learning-controls">
            <button class="control-btn" onclick="speakCurrent()">
                <i class="fas fa-volume-up"></i><br>重聽
            </button>
            <button class="control-btn main-action" id="mic-btn" onclick="startListening()">
                <i class="fas fa-microphone"></i><br>跟讀
            </button>
        </div>
        
        <p id="rec-status" style="margin-top: 15px; color: #636e72;">點擊綠色按鈕開始跟讀</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
